<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="assets/image.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hussain Kalsekar — Digital Card</title>
<style>
  :root{
    --bg-deep:#060912;
    --bg-navy:#0b1226;
    --accent-blue:#2f8bff;
    --accent-violet:#6d5bff;
    --line-blue:#3fa9ff;
    --text-main:#f2f5fb;
    --text-sub:#9fb0cc;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    background:var(--bg-deep);
    min-height:100vh;
    font-family:'Segoe UI',Roboto,Arial,sans-serif;
    overflow-x:hidden;
  }

  #particle-canvas{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    z-index:0;
    background:radial-gradient(ellipse at 50% 0%, #101a34 0%, var(--bg-deep) 70%);
  }

  .card-wrap{
    position:relative;
    z-index:2;
    max-width:420px;
    margin:0 auto;
    min-height:100vh;
    padding:40px 24px 48px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  /* ---- Floating glass card panel ---- */
  .card-panel{
    position:relative;
    width:100%;
    max-width:340px;
    border-radius:28px;
    background:linear-gradient(165deg, rgba(20,30,55,0.75), rgba(6,10,20,0.85));
    border:1px solid rgba(63,169,255,0.35);
    backdrop-filter:blur(8px);
    box-shadow:0 0 60px rgba(47,139,255,0.22), 0 25px 60px rgba(0,0,0,0.55);
    padding:30px 26px 32px;
    display:flex;
    flex-direction:column;
    align-items:center;
    transform-style:preserve-3d;
    transition:transform .12s ease;
    opacity:0;
    animation:cardIn .8s ease .1s forwards, floatCard 6s ease-in-out 1s infinite;
  }
  .card-panel::before{
    content:'';
    position:absolute;
    inset:-1px;
    border-radius:28px;
    padding:1px;
    background:linear-gradient(135deg, rgba(63,169,255,0.6), rgba(109,91,255,0.1), rgba(63,169,255,0.6));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    opacity:.6;
    animation:borderPulse 3.5s ease-in-out infinite;
    pointer-events:none;
  }

  @keyframes cardIn{
    from{opacity:0; transform:translateY(24px) scale(.96);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  @keyframes floatCard{
    0%,100%{ }
    50%{ }
  }
  @keyframes borderPulse{
    0%,100%{opacity:.35;}
    50%{opacity:.85;}
  }

  .logo{
    width:100px;
    margin-bottom:22px;
    filter:drop-shadow(0 0 12px rgba(63,169,255,0.35));
  }

  .photo-frame{
    width:220px;
    height:250px;
    border-radius:18px;
    overflow:hidden;
    border:1px solid rgba(63,169,255,0.35);
    box-shadow:0 0 30px rgba(47,139,255,0.25), inset 0 0 30px rgba(0,0,0,0.4);
    margin-bottom:20px;
    position:relative;
    background:#000;
  }
  .photo-frame video,
  .photo-frame img{
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  /* mute/unmute control overlay on the video */
  .video-mute-btn{
    position:absolute;
    bottom:10px;
    right:10px;
    width:32px;height:32px;
    border-radius:50%;
    background:rgba(6,10,20,0.65);
    border:1px solid rgba(63,169,255,0.4);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:3;
  }
  .video-mute-btn svg{
    width:16px;height:16px;
    stroke:#f2f5fb;
    fill:none;
    stroke-width:1.8;
  }

  .name{
    font-size:24px;
    font-weight:700;
    color:var(--text-main);
    letter-spacing:0.3px;
    margin-bottom:6px;
    text-align:center;
  }
  .title{
    font-size:11px;
    letter-spacing:3px;
    color:var(--text-sub);
    text-transform:uppercase;
    margin-bottom:9px;
  }
  .company{
    font-size:14px;
    font-weight:600;
    color:var(--accent-blue);
    margin-bottom:22px;
    letter-spacing:0.5px;
  }

  .toggle-btn{
    width:58px;height:58px;
    border-radius:50%;
    background:linear-gradient(145deg,var(--accent-blue),var(--accent-violet));
    border:none;
    color:#fff;
    cursor:pointer;
    box-shadow:0 6px 20px rgba(47,139,255,0.45);
    transition:transform .2s ease, box-shadow .2s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }
  .toggle-btn svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:1.8;transition:transform .3s ease;}
  .toggle-btn:hover{transform:scale(1.08); box-shadow:0 8px 28px rgba(47,139,255,0.6);}
  .toggle-btn:active{transform:scale(0.94);}
  .toggle-btn.spin svg{transform:rotate(45deg);}

  .toggle-label{
    font-size:11px;
    letter-spacing:3px;
    color:var(--text-sub);
    margin-top:10px;
    text-transform:uppercase;
  }

  .divider{
    width:100%;
    max-width:340px;
    height:1px;
    background:linear-gradient(90deg,transparent,rgba(63,169,255,0.25),transparent);
    margin:28px 0 20px;
  }

  .icon-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px 16px;
    width:100%;
    max-width:340px;
    max-height:0;
    opacity:0;
    overflow:hidden;
    transition:max-height .45s ease, opacity .45s ease;
  }
  .icon-grid.open{
    max-height:600px;
    opacity:1;
  }

  .icon-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    text-decoration:none;
  }
  .icon-circle{
    width:56px;height:56px;
    border-radius:50%;
    background:rgba(63,169,255,0.08);
    border:1px solid rgba(63,169,255,0.25);
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background .2s ease, transform .2s ease;
  }
  .icon-item:hover .icon-circle{
    background:rgba(63,169,255,0.22);
    transform:translateY(-3px);
  }
  .icon-circle svg{
    width:22px;height:22px;
    stroke:var(--text-main);
    fill:none;
    stroke-width:1.7;
  }
  .icon-label{
    font-size:10px;
    color:var(--text-sub);
    letter-spacing:0.5px;
    text-align:center;
  }

  /* QR modal */
  .qr-modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(6,9,18,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:10;
  }
  .qr-modal.show{display:flex;}
  .qr-box{
    background:#fff;
    padding:20px;
    border-radius:16px;
    text-align:center;
  }
  .qr-box img{width:220px;height:220px;display:block;}
  .qr-box p{margin-top:10px;font-size:12px;color:#333;}
  .qr-close{
    margin-top:14px;
    background:var(--accent-blue);
    color:#fff;
    border:none;
    padding:8px 22px;
    border-radius:20px;
    font-size:12px;
    cursor:pointer;
  }

  @media (max-width:380px){
    .card-panel{max-width:300px; padding:26px 20px 28px;}
    .photo-frame{width:190px;height:220px;}
    .icon-circle{width:48px;height:48px;}
  }

  /* ---- Toast ---- */
  .toast{
    position:fixed;
    bottom:28px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
    color:#fff;
    padding:12px 22px;
    border-radius:30px;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.3px;
    box-shadow:0 8px 30px rgba(47,139,255,0.5);
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease, transform .3s ease;
    z-index:20;
    white-space:nowrap;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div class="card-wrap">

  <div class="card-panel" id="cardPanel">
    <img src="assets\image.png" alt="366 DigitX" class="logo">

    <div class="photo-frame">
      <video
        id="profileVideo"
        src="assets/profile.mp4"
        poster="assets/founder.png"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
        onerror="this.style.display='none'; document.getElementById('fallbackImg').style.display='block'; document.getElementById('muteToggleBtn').style.display='none';">
        Your browser does not support the video tag.
      </video>
      <img id="fallbackImg" src="assets/founder.png" alt="Hussain Kalsekar" style="display:none;">
      <button class="video-mute-btn" id="muteToggleBtn" aria-label="Toggle sound">
        <svg id="muteIcon" viewBox="0 0 24 24">

    <button class="toggle-btn" id="toggleBtn" aria-label="Connect">

        <path d="M9 13c-2 .3-3 1.6-3.5 4.5C7.8 17 9 15.7 9.5 14"/>
        <path d="M15 13c2 .3 3 1.6 3.5 4.5C16.2 17 15 15.7 14.5 14"/>

      </svg>
    </button>
    <div class="toggle-label" id="toggleLabel">CONNECT</div>
  </div>

  <div class="divider"></div>

  <div class="icon-grid" id="iconGrid">

    <a class="icon-item" href="https://www.instagram.com/366digitx?igsh=MWJtNnFwYjVlbm9tOA==" target="_blank">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.6" fill="currentColor" stroke="none"/></svg>
      </div>
      <div class="icon-label">Instagram</div>
    </a>

    <a class="icon-item" href="mailto:hussain@366digitx.com">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 6l9 7 9-7"/></svg>
      </div>
      <div class="icon-label">Email</div>
    </a>

    <a class="icon-item" href="tel:+919867881620">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24"><path d="M4 4c0 9 7 16 16 16l3-4-6-3-2 2c-2-1-4-3-5-5l2-2-3-6-5 2z"/></svg>
      </div>
      <div class="icon-label">Call</div>
    </a>

    <a class="icon-item" href="https://wa.me/919867881620" target="_blank">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.5 8.5 0 1 1-4-7.2"/><path d="M21 3l-5 2 2 5-3 3-3-3"/></svg>
      </div>
      <div class="icon-label">Message</div>

    <a class="icon-item" href="https://www.366digitx.com" target="_blank">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>
      </div>
      <div class="icon-label">Website</div>
    </a>

    <a class="icon-item" href="https://www.linkedin.com/company/366digitx/" target="_blank">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="7" y1="10" x2="7" y2="17"/><circle cx="7" cy="7" r="0.6" fill="currentColor" stroke="none"/><path d="M11 17v-4c0-1.5 1-2.5 2.5-2.5S16 11.5 16 13v4M11 10.5V17"/></svg>
      </div>

    <a class="icon-item" href="#" id="saveContactBtn">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c0-3.3 2.6-5.5 5.5-5.5s5.5 2.2 5.5 5.5"/><path d="M18 8v6M15 11h6"/></svg>

        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><line x1="14" y1="14" x2="21" y2="14"/><line x1="14" y1="21" x2="21" y2="21"/><line x1="14" y1="17.5" x2="21" y2="17.5"/></svg>

<div class="qr-modal" id="qrModal">
  <div class="qr-box">
    <div id="qrCanvasHolder"></div>
    <p>Scan to save this card</p>
    <button class="qr-close" id="qrClose">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  // ---- toast helper ----
  const toastEl = document.getElementById('toast');
  let toastTimer;
  function showToast(msg){
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(()=> toastEl.classList.remove('show'), 2200);
  }

  // ---- video mute/unmute toggle ----
  const profileVideo = document.getElementById('profileVideo');
  const muteToggleBtn = document.getElementById('muteToggleBtn');
  const muteIcon = document.getElementById('muteIcon');
  const speakerOnPath = '<path d="M4 9v6h4l5 5V4L8 9H4z"/><path d="M16 8a5 5 0 0 1 0 8"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/>';
  const speakerOffPath = '<path d="M4 9v6h4l5 5V4L8 9H4z"/><line x1="16" y1="9" x2="21" y2="15"/><line x1="21" y1="9" x2="16" y2="15"/>';
  muteToggleBtn.addEventListener('click', () => {
    profileVideo.muted = !profileVideo.muted;
    muteIcon.innerHTML = profileVideo.muted ? speakerOffPath : speakerOnPath;
  });

  // ---- open/close icon grid ----
  const toggleBtn = document.getElementById('toggleBtn');
  const toggleLabel = document.getElementById('toggleLabel');
  const iconGrid = document.getElementById('iconGrid');
  let gridOpen = false;
  toggleBtn.addEventListener('click', () => {
    gridOpen = !gridOpen;
    iconGrid.classList.toggle('open', gridOpen);
    toggleBtn.classList.toggle('spin', gridOpen);
    toggleLabel.textContent = gridOpen ? 'CLOSE' : 'CONNECT';
  });

  // ---- 3D tilt effect on card ----
  const cardPanel = document.getElementById('cardPanel');
  cardPanel.addEventListener('mousemove', (e) => {
    const rect = cardPanel.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const rotateY = ((x / rect.width) - 0.5) * 12;
    const rotateX = ((y / rect.height) - 0.5) * -12;
    cardPanel.style.transform = `perspective(700px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  });
  cardPanel.addEventListener('mouseleave', () => {
    cardPanel.style.transform = 'perspective(700px) rotateX(0deg) rotateY(0deg)';
  });

  // ---- Auto-generate vCard (.vcf) on click ----
  document.getElementById('saveContactBtn').addEventListener('click', (e) => {
    e.preventDefault();
    const vcard = [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'N:Kalsekar;Hussain;;;',
      'FN:Dr.M.Hussain Kalsekar',
      'ORG:366 DigitX',
      'TITLE:Founder & CEO',
      'TEL;TYPE=CELL:+919867881620',
      'EMAIL:hussain@366digitx.com',
      'URL:https://www.366digitx.com',
      'END:VCARD'
    ].join('\n');
    const blob = new Blob([vcard], { type: 'text/vcard' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Hussain-Kalsekar.vcf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Contact saved ✓');
  });

  // ---- Share button (native share / clipboard fallback) ----
  document.getElementById('shareBtn').addEventListener('click', async (e) => {
    e.preventDefault();
    const shareData = {
      title: 'Hussain Kalsekar — 366 DigitX',
      text: 'Connect with Hussain Kalsekar, Founder & CEO of 366 DigitX',
      url: window.location.href
    };
    if (navigator.share) {
      try { await navigator.share(shareData); }
      catch(err){ /* user cancelled */ }
    } else {
      try {
        await navigator.clipboard.writeText(shareData.url);
        showToast('Link copied ✓');
      } catch(err){
        showToast('Could not copy link');
      }
    }
  });

  // ---- QR modal (auto-generated from current URL) ----
  const qrModal = document.getElementById('qrModal');
  const qrHolder = document.getElementById('qrCanvasHolder');
  let qrGenerated = false;
  document.getElementById('qrTrigger').addEventListener('click', (e) => {
    e.preventDefault();
    if (!qrGenerated && window.QRCode) {
      new QRCode(qrHolder, {
        text: window.location.href,
        width: 200,
        height: 200,
        colorDark: '#0b1226',
        colorLight: '#ffffff'
      });
      qrGenerated = true;
    }
    qrModal.classList.add('show');
  });
  document.getElementById('qrClose').addEventListener('click', () => {
    qrModal.classList.remove('show');
  });

  // ---- particle network background ----
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles;
  const COUNT = 70;
  const MAX_DIST = 130;

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function initParticles(){
    particles = [];
    for(let i=0;i<COUNT;i++){
      particles.push({
        x: Math.random()*w,
        y: Math.random()*h,
        vx: (Math.random()-0.5)*0.4,
        vy: (Math.random()-0.5)*0.4,
        r: Math.random()*1.5+1
      });
    }
  }
  initParticles();

  function step(){
    ctx.clearRect(0,0,w,h);
    for(const p of particles){
      p.x += p.vx;
      p.y += p.vy;
      if(p.x<0||p.x>w) p.vx*=-1;
      if(p.y<0||p.y>h) p.vy*=-1;
    }
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const a=particles[i], b=particles[j];
        const dx=a.x-b.x, dy=a.y-b.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<MAX_DIST){
          ctx.strokeStyle = `rgba(63,169,255,${0.35*(1-dist/MAX_DIST)})`;
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(a.x,a.y);
          ctx.lineTo(b.x,b.y);
          ctx.stroke();
        }
      }
    }
    for(const p of particles){
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = 'rgba(120,190,255,0.85)';
      ctx.fill();
    }
    requestAnimationFrame(step);
  }
  step();
</script>

</body>
</html>
